name: 'padlock-action'
description: 'Detect padding waste, false sharing, and cache locality problems in C, C++, Rust, and Go structs.'

author: 'gidotencate'

branding:
  icon: 'lock'
  color: 'blue'

inputs:
  path:
    description: >
      Path to a binary (.o, ELF), source file (.c, .cpp, .rs, .go), or
      directory to analyse. Multiple paths can be passed as a newline-separated
      string.
    required: true

  fail-on-severity:
    description: >
      Minimum severity that causes the step to exit non-zero (blocking the
      merge). Valid values: `high` (default), `medium`, `low`, `none`.
    default: 'high'

  output-format:
    description: >
      `human`    (default) — coloured summary printed to the log.
      `json`     — machine-readable JSON written to `padlock-results.json`.
      `sarif`    — SARIF 2.1.0 written to `padlock-results.sarif` and optionally
                   uploaded to GitHub Code Scanning.
      `markdown` — GFM report appended to the GitHub Actions step summary
                   (`$GITHUB_STEP_SUMMARY`) so findings appear on the workflow
                   summary page without leaving the Actions UI.
    default: 'human'

  upload-sarif:
    description: >
      When `true` and `output-format` is `sarif`, automatically upload the
      SARIF report to GitHub Code Scanning. Requires `security-events: write`
      permission in the calling workflow.
    default: 'true'

  padlock-version:
    description: >
      Version of padlock to install (e.g. `0.4.0`). Defaults to `latest`.
      Pin to a specific version for reproducible CI.
    default: 'latest'

outputs:
  findings-count:
    description: 'Total number of findings across all severity levels.'
    value: ${{ steps.analyse.outputs.findings-count }}

  high-count:
    description: 'Number of High-severity findings.'
    value: ${{ steps.analyse.outputs.high-count }}

  medium-count:
    description: 'Number of Medium-severity findings.'
    value: ${{ steps.analyse.outputs.medium-count }}

  low-count:
    description: 'Number of Low-severity findings.'
    value: ${{ steps.analyse.outputs.low-count }}

runs:
  using: 'composite'
  steps:
    # ── Install padlock ─────────────────────────────────────────────────────────
    # Prefer pre-built binaries from GitHub Releases (~10 s) and fall back to
    # `cargo install` (~3 min) when no binary is available for the platform.
    - name: Install padlock
      shell: bash
      run: |
        set -euo pipefail

        REPO="gidotencate/padlock"
        VERSION="${{ inputs.padlock-version }}"

        # Resolve "latest" → concrete version via GitHub API.
        # Use -L (follow redirects) without -f so a 404 (no releases yet) does
        # not kill the script; handle the empty-result case explicitly instead.
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(curl -sSL "https://api.github.com/repos/$REPO/releases/latest" \
            | grep '"tag_name"' \
            | sed 's/.*"v\([^"]*\)".*/\1/') || true
          if [ -z "$VERSION" ]; then
            echo "No GitHub Release found for $REPO; installing latest via cargo..."
            cargo install padlock-cli
            exit 0
          fi
        fi

        # Map runner platform to release-asset target triple
        case "$RUNNER_OS-$RUNNER_ARCH" in
          Linux-X64)   TARGET="x86_64-unknown-linux-gnu";  EXT="tar.gz" ;;
          Linux-ARM64) TARGET="aarch64-unknown-linux-gnu"; EXT="tar.gz" ;;
          macOS-X64)   TARGET="x86_64-apple-darwin";       EXT="tar.gz" ;;
          macOS-ARM64) TARGET="aarch64-apple-darwin";      EXT="tar.gz" ;;
          Windows-X64) TARGET="x86_64-pc-windows-msvc";   EXT="zip"    ;;
          *)           TARGET=""; EXT="" ;;
        esac

        INSTALL_DIR="$HOME/.padlock-bin"
        mkdir -p "$INSTALL_DIR"

        DOWNLOADED=false
        if [ -n "$TARGET" ]; then
          ASSET="padlock-v${VERSION}-${TARGET}.${EXT}"
          URL="https://github.com/$REPO/releases/download/v${VERSION}/${ASSET}"
          TMP="/tmp/${ASSET}"
          if curl -sSfL "$URL" -o "$TMP"; then
            if [ "$EXT" = "tar.gz" ]; then
              tar xzf "$TMP" -C "$INSTALL_DIR"
            else
              # Windows: use PowerShell (available on Windows runners)
              powershell -Command "Expand-Archive -Path '$TMP' -DestinationPath '$INSTALL_DIR' -Force"
            fi
            echo "$INSTALL_DIR" >> "$GITHUB_PATH"
            echo "Installed padlock ${VERSION} from pre-built binary (${TARGET})"
            DOWNLOADED=true
          fi
        fi

        if [ "$DOWNLOADED" = "false" ]; then
          echo "No pre-built binary for $RUNNER_OS-$RUNNER_ARCH; installing via cargo (this may take a few minutes)..."
          cargo install padlock-cli --version "$VERSION"
        fi

    # ── Run analysis ────────────────────────────────────────────────────────────
    - name: Run padlock analysis
      id: analyse
      shell: bash
      run: |
        set -euo pipefail

        FORMAT="${{ inputs.output-format }}"
        # Support newline-separated list of paths
        PATHS=(${{ inputs.path }})

        # Always collect JSON so we can count findings for outputs / thresholds.
        padlock analyze --json "${PATHS[@]}" > /tmp/padlock-results.json 2>&1 || true

        # Also run the chosen output format for the log / artefacts.
        if [ "$FORMAT" = "sarif" ]; then
          padlock analyze --sarif "${PATHS[@]}" > padlock-results.sarif
        elif [ "$FORMAT" = "json" ]; then
          cp /tmp/padlock-results.json padlock-results.json
        elif [ "$FORMAT" = "markdown" ]; then
          padlock analyze --markdown "${PATHS[@]}" >> "$GITHUB_STEP_SUMMARY" || true
        else
          padlock analyze "${PATHS[@]}" || true
        fi

        # Count findings by severity from JSON output.
        python3 - <<'PY'
        import json, os, sys

        try:
            d = json.load(open('/tmp/padlock-results.json'))
        except Exception as e:
            print(f"Warning: could not parse JSON output: {e}", file=sys.stderr)
            d = {}

        findings = [
            f
            for s in d.get('structs', [])
            for f in s.get('findings', [])
        ]
        high   = sum(1 for f in findings if f.get('severity') == 'High')
        medium = sum(1 for f in findings if f.get('severity') == 'Medium')
        low    = sum(1 for f in findings if f.get('severity') == 'Low')
        total  = len(findings)

        out = os.environ.get('GITHUB_OUTPUT', '')
        if out:
            with open(out, 'a') as fh:
                fh.write(f'high-count={high}\n')
                fh.write(f'medium-count={medium}\n')
                fh.write(f'low-count={low}\n')
                fh.write(f'findings-count={total}\n')

        print(f'padlock: {total} finding(s) — High={high} Medium={medium} Low={low}')

        fail_on = os.environ.get('PADLOCK_FAIL_ON', 'high')
        should_fail = (
            (fail_on == 'high'   and high > 0)
            or (fail_on == 'medium' and (high + medium) > 0)
            or (fail_on == 'low'    and total > 0)
        )
        if should_fail:
            # Emit GitHub Actions error annotation
            print(f'::error::padlock: {total} finding(s) at or above "{fail_on}" severity.')
            sys.exit(1)
        PY
      env:
        PADLOCK_FAIL_ON: ${{ inputs.fail-on-severity }}

    # ── Upload SARIF ────────────────────────────────────────────────────────────
    - name: Upload SARIF to GitHub Code Scanning
      if: ${{ inputs.output-format == 'sarif' && inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: padlock-results.sarif
        category: padlock
