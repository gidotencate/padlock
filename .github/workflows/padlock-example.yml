# Example workflow: run padlock on every PR and block merges on high-severity
# struct layout regressions.
#
# To use this in your own repository:
#   1. Copy this file to .github/workflows/padlock.yml
#   2. Replace `uses: gidotencate/padlock@v1` with the version you want to pin
#   3. Adjust `path` to point at your source directory or compiled binary

name: Struct Layout Analysis

on:
  workflow_dispatch:  # run manually to test the action; copy this file to your own repo and change to push/pull_request

permissions:
  contents: read
  security-events: write   # only required when output-format: sarif

jobs:
  padlock:
    name: padlock
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Option A: source file analysis (no build needed) ────────────────────
      - name: Analyse Rust source
        uses: gidotencate/padlock@v0.5.3
        with:
          path: crates/
          output-format: human
          fail-on-severity: high

      # ── Option B: SARIF (shows inline annotations on PR diffs) ──────────────
      # Requires: Settings → Code security → Code scanning → enabled
      #
      # - name: Analyse struct layouts (SARIF)
      #   uses: gidotencate/padlock@v0.5.3
      #   with:
      #     path: crates/
      #     output-format: sarif
      #     upload-sarif: 'true'
      #     fail-on-severity: high

      # ── Option C: compiled binary (most accurate — uses DWARF debug info) ───
      # - uses: dtolnay/rust-toolchain@stable
      # - run: cargo build
      # - name: Analyse binary
      #   uses: gidotencate/padlock@v0.5.3
      #   with:
      #     path: target/debug/myapp
      #     output-format: human
      #     fail-on-severity: high

