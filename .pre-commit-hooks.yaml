- id: padlock
  name: padlock layout check
  description: Analyze struct memory layouts for padding waste and false sharing
  language: rust
  entry: padlock analyze
  types_or: [rust, c, c++, go, zig]
  pass_filenames: true
  args: []

- id: padlock-strict
  name: padlock layout check (strict)
  description: Analyze struct layouts — fails the commit on any High severity finding
  language: rust
  entry: padlock analyze
  types_or: [rust, c, c++, go, zig]
  pass_filenames: true
  args: ['--fail-on-severity', 'high']
