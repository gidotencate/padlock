<path d="M394,170 L394,182 L336,182 L336,260" fill="none" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Data locality: straight down at x=573 (right of enrichment right edge 494), then left -->
<path d="M573,170 L573,260 L430,260" fill="none" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Raw findings   row 3 y=262..306 -->
<rect x="230" y="262" width="220" height="44" rx="8" stroke-width="0.5" style="fill:rgb(8,80,65);stroke:rgb(93,202,165)"/>
