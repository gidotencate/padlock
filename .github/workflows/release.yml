name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Create the GitHub release once, before any build jobs run.
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: padlock
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: padlock
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: padlock
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: padlock
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: padlock.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }} -p padlock-cli

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p padlock-cli

      - name: Package (Unix tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf padlock-${{ github.ref_name }}-${{ matrix.target }}.tar.gz padlock cargo-padlock
          mv padlock-${{ github.ref_name }}-${{ matrix.target }}.tar.gz $GITHUB_WORKSPACE/

      - name: Package (Windows zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path padlock.exe, cargo-padlock.exe -DestinationPath $env:GITHUB_WORKSPACE/padlock-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: padlock-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
